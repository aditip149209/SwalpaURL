<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwalpaURL - Wacky URL Shortener</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Syne:wght@400..800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        // 'font-display' will use the punchy Instagram heading font
                        display: ['Syne', 'sans-serif'],
                        // 'font-sans' will overwrite the default body text font
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-md w-full bg-gray-800 p-8 rounded-sm shadow-2xl border border-gray-700">
        <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-green-400 text-center mb-2">
            SwalpaURL
        </h1>
        <p class="text-gray-400 text-center text-sm mb-8">Precomputed, lightning-fast wacky link shortener</p>

        <form hx-post="/shorten" 
      hx-target="#result-container" 
      hx-swap="innerHTML"
      class="space-y-4">
    <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Destination URL</label>
        <input type="url" 
               name="url" 
               id="url"
               required 
               placeholder="https://example.com/very/long/path" 
               class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-sm focus:outline-none focus:border-green-500 text-white placeholder-gray-400 transition">
    </div>
    <button type="submit" 
            class="w-full py-3 bg-green-800 hover:from-green-600 hover:to-blue-700 text-white font-bold rounded-sm shadow-lg transform active:scale-95 transition">
        Shorten It!
    </button>
</form>

<div id="result-container" class="mt-6 animate-fade-in"></div>
    </div>

</body>
</html>
